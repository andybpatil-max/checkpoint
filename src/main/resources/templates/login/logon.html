<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Checkpoint - Login</title>
    <link rel="stylesheet" th:href="@{/css/global-1.css}" href="/css/global-1.css"/>
</head>
<body>
<div class="login-container">
    <h2>Checkpoint Login</h2>

    <div th:if="${param.error}" class="error-msg">
        Invalid user ID or password.
    </div>
    <div th:if="${param.logout}" class="info-msg">
        You have been logged out.
    </div>
    <div th:if="${param.sessionExpired}" class="info-msg">
        Your session has expired. Please log in again.
    </div>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <table>
            <tr>
                <td><label for="username">User ID:</label></td>
                <td><input type="text" id="username" name="username" autofocus="autofocus"/></td>
            </tr>
            <tr>
                <td><label for="password">Password:</label></td>
                <td><input type="password" id="password" name="password"/></td>
            </tr>
            <tr>
                <td colspan="2">
                    <input type="submit" value="Login"/>
                </td>
            </tr>
        </table>
    </form>
</div>
</body>
</html>
