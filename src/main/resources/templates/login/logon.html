<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Checkpoint - Login</title>
    <link rel="stylesheet" th:href="@{/css/global-1.css}" href="/css/global-1.css"/>
    <link rel="stylesheet" th:href="@{/css/screen.css}" href="/css/screen.css"/>
</head>
<body>
<div id="banner" style="height:80px;">
    <div class="logo" style="height:80px;"></div>
</div>

<div style="text-align:center; padding:40px;">
    <h2>Checkpoint Login</h2>

    <div th:if="${param.error}" style="color:red; margin-bottom:10px;">
        Invalid user ID or password.
    </div>
    <div th:if="${param.logout}" style="color:green; margin-bottom:10px;">
        You have been logged out.
    </div>
    <div th:if="${param.sessionExpired}" style="color:orange; margin-bottom:10px;">
        Your session has expired. Please log in again.
    </div>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <table align="center" cellpadding="6">
            <tr>
                <td><label for="username">User ID:</label></td>
                <td><input type="text" id="username" name="username" autofocus="autofocus"/></td>
            </tr>
            <tr>
                <td><label for="password">Password:</label></td>
                <td><input type="password" id="password" name="password"/></td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Login"/>
                </td>
            </tr>
        </table>
    </form>
</div>
</body>
</html>
