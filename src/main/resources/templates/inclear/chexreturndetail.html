<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Checkpoint - Return Detail</title>
<link rel="stylesheet" th:href="@{/css/global-1.css}"/></head>
<body>
<div id="header"><table width="100%" cellpadding="2"><tr>
  <td><strong>Checkpoint</strong> &nbsp; <a th:href="@{/Menu.action}">Menu</a></td>
  <td align="right">Welcome, <span th:text="${user != null ? user.userFName + ' ' + user.userLName : ''}">User</span>
    &nbsp; <a th:href="@{/Logoff.action}">Logoff</a></td>
</tr></table></div>
<div id="content">
  <h2>Return Detail</h2>
  <div th:if="${error}" style="color:red" th:text="${error}"></div>
  <form method="post" th:action="@{/ChexReturn.action(action='Return')}" th:object="${chexDetail}">
    <table cellpadding="4">
      <tr><td>Account #:</td><td><input type="text" th:field="*{chex_account_num}" readonly/></td></tr>
      <tr><td>Check #:</td><td><input type="text" th:field="*{chex_check_num}" readonly/></td></tr>
      <tr><td>Unique ISN:</td><td><input type="text" th:field="*{chex_unique_isn}" readonly/></td></tr>
      <tr><td>Amount:</td><td><input type="text" th:field="*{chex_check_amount}" readonly/></td></tr>
      <tr><td>Status:</td><td><input type="text" th:field="*{chex_check_status}" readonly/></td></tr>
      <tr><td>Return Date:</td><td><input type="text" th:field="*{chex_return_date}"/></td></tr>
      <tr><td>Return Reason:</td><td><input type="text" th:field="*{chex_return_reason}"/></td></tr>
    </table>
    <button type="submit">Return</button>
  </form>
  <form method="post" th:action="@{/ChexReturn.action(action='UndoReturn')}" th:object="${chexDetail}">
    <input type="hidden" th:field="*{chex_account_num}"/>
    <input type="hidden" th:field="*{chex_check_num}"/>
    <input type="hidden" th:field="*{chex_unique_isn}"/>
    <button type="submit">Undo Return</button>
  </form>
  <p><a th:href="@{/ChexReturn.action}">Cancel</a></p>
</div></body></html>
