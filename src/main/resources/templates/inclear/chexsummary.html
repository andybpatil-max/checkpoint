<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Checkpoint - Check Summary</title>
<link rel="stylesheet" th:href="@{/css/global-1.css}"/></head>
<body>
<div id="header"><table width="100%" cellpadding="2"><tr>
  <td><strong>Checkpoint</strong> &nbsp; <a th:href="@{/Menu.action}">Menu</a></td>
  <td align="right">Welcome, <span th:text="${user != null ? user.userFName + ' ' + user.userLName : ''}">User</span>
    &nbsp; <a th:href="@{/Logoff.action}">Logoff</a></td>
</tr></table></div>
<div id="content">
  <h2>Check Status Summary</h2>
  <div th:if="${error}" style="color:red" th:text="${error}"></div>
  <table border="1" cellpadding="4">
    <tr class="tblh"><th>Status</th><th>Description</th><th>Count</th><th>Amount</th></tr>
    <tr th:each="row : ${sel.summaryrows}">
      <td th:text="${row.chex_check_status}"></td>
      <td th:text="${row.chex_status_description}"></td>
      <td th:text="${row.chex_check_count}"></td>
      <td th:text="${row.chex_summ_amount}"></td>
    </tr>
    <tr th:if="${sel.summaryrows == null or sel.summaryrows.length == 0}"><td colspan="4">No data.</td></tr>
  </table>
  <p><a th:href="@{/Chex.action}">Back to Checks</a></p>
</div></body></html>
