<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Checkpoint - Check History Images</title>
<link rel="stylesheet" th:href="@{/css/global-1.css}"/>
    <link rel="stylesheet" th:href="@{/css/screen.css}" href="/css/screen.css"/></head>
<body>
    <div th:replace="~{fragments/layout :: header}"></div>
<div id="content">
  <h2>Check History - Images</h2>
  <div th:if="${error}" style="color:red" th:text="${error}"></div>
  <table border="1" cellpadding="4">
    <tr class="tblh"><th>Account</th><th>Check#</th><th>Amount</th><th>Status</th><th>Date</th><th>Image</th></tr>
    <tr th:each="row : ${sel.checkrows}">
      <td th:text="${row.chex_account_num}"></td>
      <td th:text="${row.chex_check_num}"></td>
      <td th:text="${row.chex_check_amount_disp}"></td>
      <td th:text="${row.chex_check_status}"></td>
      <td th:text="${row.chex_proc_date_disp}"></td>
      <td><a th:if="${row.chex_image_locator != null and !row.chex_image_locator.isEmpty()}"
             th:href="${sel.imageURL + row.chex_image_locator}">View</a></td>
    </tr>
    <tr th:if="${sel.checkrows == null or sel.checkrows.length == 0}"><td colspan="6">No records found.</td></tr>
  </table>
  <p><a th:href="@{/ChexHist.action}">Back to History</a></p>
</div>    <div th:replace="~{fragments/layout :: footer}"></div>
</body></html>
