<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Checkpoint - Positive Pay Audit</title>
<link rel="stylesheet" th:href="@{/css/global-1.css}"/>
    <link rel="stylesheet" th:href="@{/css/screen.css}" href="/css/screen.css"/></head>
<body>
    <div th:replace="~{fragments/layout :: header}"></div>
<div id="content" style="text-align:center;">
  <h2>Positive Pay Audit Log</h2>
  <div th:if="${error}" style="color:red" th:text="${error}"></div>
  <form method="get" th:action="@{/PosipayAudit.action}">
    <input type="hidden" name="action" value="View"/>
    Acct From: <input type="text" name="fromAccount" th:value="${sel.pp_from_acct}"/>
    Acct To: <input type="text" name="toAccount" th:value="${sel.pp_to_acct}"/>
    Date: <input type="text" name="fromDate" th:value="${sel.pp_log_date}"/>
    <button type="submit">View</button>
  </form>
  <table border="1" cellpadding="4">
    <tr class="tblh"><th>Account</th><th>Check#</th><th>Amount</th><th>Issue Date</th><th>Payee</th><th>Date</th><th>User</th><th>Action</th></tr>
    <tr th:each="row : ${sel.posipayrows}">
      <td th:text="${row.pospay_account_num}"></td>
      <td th:text="${row.pospay_check_num}"></td>
      <td th:text="${row.pospay_check_amount_disp}"></td>
      <td th:text="${row.pospay_issue_date}"></td>
      <td th:text="${row.pospay_payee}"></td>
      <td th:text="${row.pospay_last_modified}"></td>
      <td th:text="${row.pospay_mod_user}"></td>
      <td th:text="${row.pospay_mod_func}"></td>
    </tr>
    <tr th:if="${sel.posipayrows == null or sel.posipayrows.length == 0}"><td colspan="8">No records found.</td></tr>
  </table>
</div>    <div th:replace="~{fragments/layout :: footer}"></div>
</body></html>
