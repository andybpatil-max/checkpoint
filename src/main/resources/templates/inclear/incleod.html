<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Checkpoint - Inclear EOD</title>
<link rel="stylesheet" th:href="@{/css/global-1.css}"/>
    <link rel="stylesheet" th:href="@{/css/screen.css}" href="/css/screen.css"/></head>
<body>
    <div th:replace="~{fragments/layout :: header}"></div>
<div id="content" style="text-align:center;">
  <h2>Inclear End of Day</h2>
  <div th:if="${error}" style="color:red" th:text="${error}"></div>
  <table cellpadding="4">
    <tr><td>EOD Flag:</td><td th:text="${eodParams.eod_flag}"></td></tr>
    <tr><td>BOD Flag:</td><td th:text="${eodParams.bod_flag}"></td></tr>
    <tr><td>File Loaded:</td><td th:text="${eodParams.file_loaded}"></td></tr>
    <tr><td>Today:</td><td th:text="${eodParams.today}"></td></tr>
    <tr><td>Record Count:</td><td th:text="${sel.detail_count}"></td></tr>
  </table>
  <h3>Status Summary</h3>
  <table border="1" cellpadding="4">
    <tr class="tblh"><th>Status</th><th>Description</th><th>Count</th><th>Amount</th></tr>
    <tr th:each="row : ${sel.summaryrows}">
      <td th:text="${row.chex_check_status}"></td>
      <td th:text="${row.chex_status_description}"></td>
      <td th:text="${row.chex_check_count}"></td>
      <td th:text="${row.chex_summ_amount}"></td>
    </tr>
    <tr th:if="${sel.summaryrows == null or sel.summaryrows.length == 0}"><td colspan="4">No data.</td></tr>
  </table>
  <form method="post" th:action="@{/InclEod.action(action='Confirm')}">
    <button type="submit">Confirm EOD</button>
  </form>
  <form method="post" th:action="@{/InclEod.action(action='UnDo')}" style="display:inline">
    <button type="submit">UnDo EOD</button>
  </form>
</div>    <div th:replace="~{fragments/layout :: footer}"></div>
</body></html>
