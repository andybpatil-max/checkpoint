<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Checkpoint - Stop Pay Audit</title>
<link rel="stylesheet" th:href="@{/css/global-1.css}"/></head>
<body>
<div id="header"><table width="100%" cellpadding="2"><tr>
  <td><strong>Checkpoint</strong> &nbsp; <a th:href="@{/Menu.action}">Menu</a></td>
  <td align="right">Welcome, <span th:text="${user != null ? user.userFName + ' ' + user.userLName : ''}">User</span>
    &nbsp; <a th:href="@{/Logoff.action}">Logoff</a></td>
</tr></table></div>
<div id="content">
  <h2>Stop Pay Audit Log</h2>
  <div th:if="${error}" style="color:red" th:text="${error}"></div>
  <form method="get" th:action="@{/StoppayAudit.action}">
    <input type="hidden" name="action" value="View"/>
    Acct From: <input type="text" name="fromAccount" th:value="${sel.sp_from_acct}"/>
    Acct To: <input type="text" name="toAccount" th:value="${sel.sp_to_acct}"/>
    Date: <input type="text" name="fromDate" th:value="${sel.sp_log_date}"/>
    <button type="submit">View</button>
  </form>
  <table border="1" cellpadding="4">
    <tr class="tblh"><th>Account</th><th>Check#</th><th>Amount</th><th>Issue Date</th><th>Payee</th><th>Date</th><th>User</th><th>Action</th></tr>
    <tr th:each="row : ${sel.stoppayrows}">
      <td th:text="${row.stopay_account_num}"></td>
      <td th:text="${row.stopay_check_num}"></td>
      <td th:text="${row.stopay_check_amount_disp}"></td>
      <td th:text="${row.stopay_issue_date}"></td>
      <td th:text="${row.stopay_payee}"></td>
      <td th:text="${row.stopay_last_modified}"></td>
      <td th:text="${row.stopay_mod_user}"></td>
      <td th:text="${row.stopay_mod_func}"></td>
    </tr>
    <tr th:if="${sel.stoppayrows == null or sel.stoppayrows.length == 0}"><td colspan="8">No records found.</td></tr>
  </table>
</div></body></html>
