<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Checkpoint - Check Returns</title>
<link rel="stylesheet" th:href="@{/css/global-1.css}"/>
    <link rel="stylesheet" th:href="@{/css/screen.css}" href="/css/screen.css"/></head>
<body>
    <div th:replace="~{fragments/layout :: header}"></div>
<div id="content" style="text-align:center;">
  <h2>Check Returns</h2>
  <div th:if="${error}" style="color:red" th:text="${error}"></div>
  <table border="1" cellpadding="4">
    <tr class="tblh"><th>Account</th><th>Check#</th><th>Amount</th><th>Return Date</th><th>Return Reason</th><th>Status</th><th>Action</th></tr>
    <tr th:each="row : ${sel.checkrows}">
      <td th:text="${row.chex_account_num}"></td>
      <td th:text="${row.chex_check_num}"></td>
      <td th:text="${row.chex_check_amount_disp}"></td>
      <td th:text="${row.chex_return_date}"></td>
      <td th:text="${row.chex_return_reason}"></td>
      <td th:text="${row.chex_check_status}"></td>
      <td><a th:href="@{/ChexReturn.action(action='Detail', acctNum=${row.chex_account_num}, checkNum=${row.chex_check_num}, uniqueIsn=${row.chex_unique_isn}, procDate=${row.chex_proc_date})}">Detail</a></td>
    </tr>
    <tr th:if="${sel.checkrows == null or sel.checkrows.length == 0}"><td colspan="7">No returns found.</td></tr>
  </table>
</div>    <div th:replace="~{fragments/layout :: footer}"></div>
</body></html>
