<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Checkpoint - Load Checks</title>
<link rel="stylesheet" th:href="@{/css/global-1.css}"/>
    <link rel="stylesheet" th:href="@{/css/screen.css}" href="/css/screen.css"/></head>
<body>
    <div th:replace="~{fragments/layout :: header}"></div>
<div id="content" style="text-align:center;">
  <h2>Load Inclear Checks</h2>
  <div th:if="${error}" style="color:red" th:text="${error}"></div>
  <table cellpadding="4">
    <tr><td>Appl Date:</td><td th:text="${ctlDetail.appl_date}"></td></tr>
    <tr><td>Bank ID:</td><td th:text="${ctlDetail.bankId}"></td></tr>
    <tr><td>Our ABA:</td><td th:text="${ctlDetail.ourAba}"></td></tr>
    <tr><td>File Loaded:</td><td th:text="${ctlDetail.file_loaded}"></td></tr>
    <tr><td>Loaded Time:</td><td th:text="${ctlDetail.file_loaded_time}"></td></tr>
  </table>
  <form method="post" th:action="@{/LoadChex.action(action='LoadFile')}">
    <table cellpadding="4">
      <tr><td>File To Load:</td><td><input type="text" name="fileToLoad" size="60"/></td></tr>
    </table>
    <button type="submit">Load File</button>
  </form>
  <p><a th:href="@{/LoadChex.action(action='ViewStats')}">View Load Stats</a></p>
</div>    <div th:replace="~{fragments/layout :: footer}"></div>
</body></html>
