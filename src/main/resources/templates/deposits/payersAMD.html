<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Checkpoint - Payer Detail</title>
<link rel="stylesheet" th:href="@{/css/global-1.css}"/>
    <link rel="stylesheet" th:href="@{/css/screen.css}" href="/css/screen.css"/></head>
<body>
    <div th:replace="~{fragments/layout :: header}"></div>
<div id="content">
  <h2 th:text="${actionMode == 'New' ? 'New Payer' : 'Modify Payer'}">Payer</h2>
  <div th:if="${error}" style="color:red" th:text="${error}"></div>
  <form method="post" th:action="${actionMode == 'New' ? '/DepositsPayer.action?action=Add' : '/DepositsPayer.action?action=Update'}" th:object="${payerDetail}">
    <table cellpadding="4">
      <tr><td>Source:</td><td><input type="text" th:field="*{payersource}"/></td></tr>
      <tr><td>ABA:</td><td>
        <th:block th:if="${actionMode == 'Modify'}"><input type="text" th:field="*{payeraba}" readonly/></th:block>
        <th:block th:if="${actionMode != 'Modify'}"><input type="text" th:field="*{payeraba}"/></th:block>
      </td></tr>
      <tr><td>Account:</td><td>
        <th:block th:if="${actionMode == 'Modify'}"><input type="text" th:field="*{payeracct}" readonly/></th:block>
        <th:block th:if="${actionMode != 'Modify'}"><input type="text" th:field="*{payeracct}"/></th:block>
      </td></tr>
      <tr><td>Name:</td><td><input type="text" th:field="*{payername}" size="40"/></td></tr>
      <tr><td>Country:</td><td><input type="text" th:field="*{payercountry}"/></td></tr>
      <tr><td>Bank:</td><td><input type="text" th:field="*{payerbank}"/></td></tr>
    </table>
    <button type="submit" th:text="${actionMode == 'New' ? 'Add' : 'Update'}">Submit</button>
    <a th:href="@{/DepositsPayer.action}"><button type="button">Cancel</button></a>
  </form>
</div>    <div th:replace="~{fragments/layout :: footer}"></div>
</body></html>
