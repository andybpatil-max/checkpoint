<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Checkpoint - Payer Audit</title>
<link rel="stylesheet" th:href="@{/css/global-1.css}"/>
    <link rel="stylesheet" th:href="@{/css/screen.css}" href="/css/screen.css"/></head>
<body>
    <div th:replace="~{fragments/layout :: header}"></div>
<div id="content" style="text-align:center;">
  <h2>Payer Audit Log</h2>
  <div th:if="${error}" style="color:red" th:text="${error}"></div>
  <form method="get" th:action="@{/DepositsPayerAudit.action}">
    <input type="hidden" name="action" value="View"/>
    ABA From: <input type="text" name="payerAbaFrom" th:value="${sel.payerAbaFrom}"/>
    ABA To: <input type="text" name="payerAbaTo" th:value="${sel.payerAbaTo}"/>
    Acct From: <input type="text" name="payerAcctFrom" th:value="${sel.payerAcctFrom}"/>
    Acct To: <input type="text" name="payerAcctTo" th:value="${sel.payerAcctTo}"/>
    <button type="submit">View</button>
  </form>
  <table border="1" cellpadding="4">
    <tr class="tblh"><th>Source</th><th>ABA</th><th>Account</th><th>Name</th><th>Country</th><th>Bank</th><th>Date</th><th>User</th><th>Action</th></tr>
    <tr th:each="row : ${sel.payerRows}">
      <td th:text="${row.payersource}"></td>
      <td th:text="${row.payeraba}"></td>
      <td th:text="${row.payeracct}"></td>
      <td th:text="${row.payername}"></td>
      <td th:text="${row.payercountry}"></td>
      <td th:text="${row.payerbank}"></td>
      <td th:text="${row.modtime}"></td>
      <td th:text="${row.moduser}"></td>
      <td th:text="${row.modfunc}"></td>
    </tr>
    <tr th:if="${sel.payerRows == null or sel.payerRows.length == 0}"><td colspan="9">No records found.</td></tr>
  </table>
</div>    <div th:replace="~{fragments/layout :: footer}"></div>
</body></html>
