<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Checkpoint - Deposits History</title>
<link rel="stylesheet" th:href="@{/css/global-1.css}"/>
    <link rel="stylesheet" th:href="@{/css/screen.css}" href="/css/screen.css"/></head>
<body>
    <div th:replace="~{fragments/layout :: header}"></div>
<div id="content">
  <h2>Deposits History</h2>
  <div th:if="${error}" style="color:red" th:text="${error}"></div>
  <form method="get" th:action="@{/DepsHist.action}">
    <input type="hidden" name="action" value="View"/>
    Period From: <input type="text" name="fromPeriod" th:value="${sel.ch_from_period}"/>
    Period To: <input type="text" name="toPeriod" th:value="${sel.ch_to_period}"/>
    Date From: <input type="text" name="fromDate" th:value="${sel.ch_from_date}"/>
    Date To: <input type="text" name="toDate" th:value="${sel.ch_to_date}"/>
    Acct From: <input type="text" name="fromAccount" th:value="${sel.ch_from_account}"/>
    Acct To: <input type="text" name="toAccount" th:value="${sel.ch_to_account}"/>
    Check From: <input type="text" name="fromCheck" th:value="${sel.ch_from_check}"/>
    Check To: <input type="text" name="toCheck" th:value="${sel.ch_to_check}"/>
    <button type="submit">View</button>
  </form>
  <table border="1" cellpadding="4">
    <tr class="tblh"><th>Account</th><th>Check#</th><th>Amount</th><th>Status</th><th>Date</th><th>Payer</th></tr>
    <tr th:each="row : ${sel.checkrows}">
      <td th:text="${row.chex_account_num}"></td>
      <td th:text="${row.chex_check_num}"></td>
      <td th:text="${row.chex_check_amount_disp}"></td>
      <td th:text="${row.chex_check_status}"></td>
      <td th:text="${row.chex_proc_date_disp}"></td>
      <td th:text="${row.chex_payee}"></td>
    </tr>
    <tr th:if="${sel.checkrows == null or sel.checkrows.length == 0}"><td colspan="6">No records found.</td></tr>
  </table>
</div>    <div th:replace="~{fragments/layout :: footer}"></div>
</body></html>
