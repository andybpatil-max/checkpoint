<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Checkpoint - Calendar</title>
    <link rel="stylesheet" th:href="@{/css/global-1.css}"/>
    <link rel="stylesheet" th:href="@{/css/screen.css}" href="/css/screen.css"/>
</head>
<body>
    <div th:replace="~{fragments/layout :: header}"></div>
<div id="content" style="text-align:center;">
    <h2>Holiday Calendar</h2>
    <div th:if="${error}" style="color:red" th:text="${error}"></div>

    <table width="50%" border="1" cellpadding="4" cellspacing="0">
        <tr class="tblh">
            <th>Year</th>
            <th>Currency</th>
            <th>Action</th>
        </tr>
        <tr th:each="row : ${sel.calendarrows}">
            <td th:text="${row.hdYear}"></td>
            <td th:text="${row.hdCurr}"></td>
            <td>
                <a th:href="@{/Calendar.action(action='Modify', year=${row.hdYear})}">Modify</a>
            </td>
        </tr>
        <tr th:if="${sel.calendarrows == null or #lists.isEmpty(sel.calendarrows)}">
            <td colspan="3">No records found.</td>
        </tr>
    </table>

    <p>
        <a th:href="@{/Calendar.action(action='New')}">
            <button type="button">New Calendar Year</button>
        </a>
    </p>
</div>
    <div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
