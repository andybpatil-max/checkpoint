<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Checkpoint - User Audit</title>
    <link rel="stylesheet" th:href="@{/css/global-1.css}"/>
    <link rel="stylesheet" th:href="@{/css/screen.css}" href="/css/screen.css"/>
</head>
<body>
    <div th:replace="~{fragments/layout :: header}"></div>
<div id="content" style="text-align:center;">
    <h2>User Audit</h2>
    <div th:if="${error}" style="color:red" th:text="${error}"></div>

    <form th:action="@{/UserAudit.action(action='View')}" method="get">
        <label>From: <input type="text" name="userFrom" size="15"/></label>
        &nbsp;
        <label>To: <input type="text" name="userTo" size="15"/></label>
        &nbsp;
        <button type="submit">View</button>
    </form>

    <br/>

    <table width="90%" border="1" cellpadding="4" cellspacing="0">
        <tr class="tblh">
            <th>User ID</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Pass Changed</th>
            <th>Pass Expires</th>
            <th>Last Login</th>
            <th>Last Failure</th>
            <th>Failed Attempts</th>
            <th>Status</th>
        </tr>
        <tr th:each="row : ${sel.userrows}">
            <td th:text="${row.user_id}"></td>
            <td th:text="${row.user_fname}"></td>
            <td th:text="${row.user_lname}"></td>
            <td th:text="${row.user_pass_lastmodified_f}"></td>
            <td th:text="${row.user_pass_expiry_f}"></td>
            <td th:text="${row.user_last_success_login_f}"></td>
            <td th:text="${row.user_last_failed_login_f}"></td>
            <td th:text="${row.user_failed_attempts}"></td>
            <td th:text="${row.user_id_blocked}"></td>
        </tr>
        <tr th:if="${sel.userrows == null or sel.userrows.length == 0}">
            <td colspan="9">No records found.</td>
        </tr>
    </table>
</div>
    <div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
