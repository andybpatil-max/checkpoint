<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Checkpoint - DB Tables</title>
    <link rel="stylesheet" th:href="@{/css/global-1.css}"/>
    <link rel="stylesheet" th:href="@{/css/screen.css}" href="/css/screen.css"/>
</head>
<body>
    <div th:replace="~{fragments/layout :: header}"></div>
<div id="content">
    <h2>DB Table Management</h2>
    <div th:if="${error}" style="color:red" th:text="${error}"></div>

    <table width="90%" border="1" cellpadding="4" cellspacing="0">
        <tr class="tblh">
            <th>Application</th>
            <th>Table</th>
            <th>SQL</th>
            <th colspan="2">Action</th>
        </tr>
        <tr th:each="row : ${sel.dbRows}">
            <td th:text="${row.dbAppl}"></td>
            <td th:text="${row.dbTable}"></td>
            <td th:text="${row.dbSql}"></td>
            <td>
                <form method="post" th:action="@{/DbTable.action(action='Delete')}" style="display:inline">
                    <input type="hidden" name="tableId" th:value="${row.dbTable}"/>
                    <button type="submit">Delete</button>
                </form>
            </td>
            <td>
                <a th:href="@{/DbTable.action(action='Modify', tableId=${row.dbTable})}">Modify</a>
            </td>
        </tr>
        <tr th:if="${sel.dbRows == null or #lists.isEmpty(sel.dbRows)}">
            <td colspan="5">No records found.</td>
        </tr>
    </table>

    <p>
        <a th:href="@{/DbTable.action(action='New')}">
            <button type="button">New DB Table</button>
        </a>
    </p>
</div>
    <div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
